name: Daily 0050 Risk Engine Update

on:
  schedule:
    # 調整為 UTC 11:00 = 台灣時間晚上 19:00 執行，給予 API 充足的數據結算時間
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytz

      - name: Run analysis engine
        run: python engine.py

      # 使用專業套件自動 commit 並寫回資料庫
      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自動更新盤後風險數據 (晚上7點定時執行)"
          file_pattern: 'latest_status.json'
