name: Daily 0050 Risk Engine Update

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

# 確保最高讀寫權限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytz

      - name: Run analysis engine
        run: python engine.py

      # 使用專業套件取代手動 Git 指令，徹底根絕 Git 報錯
      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自動更新盤後風險數據"
          file_pattern: 'latest_status.json'
