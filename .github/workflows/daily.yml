name: Daily 0050 Risk Engine Update

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytz

      - name: Run analysis engine
        run: python engine.py

      - name: Commit and Push (防彈版)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest_status.json
          
          # 檢查是否有檔案變動，有變動才執行 commit 與 push，避免引發錯誤
          if git diff-index --quiet HEAD; then
            echo "✅ 分析完成，但數據與昨日相同，無須更新。"
          else
            git commit -m "🤖 自動更新盤後風險數據"
            git push
            echo "✅ 成功將新數據上傳至資料庫！"
          fi
